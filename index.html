<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Barbería's 10 Estilo Urbano Fútbol — Cortes de élite con pasión futbolera en La Victoria, Bucaramanga" />
  <title>Barbería's 10 | Estilo Urbano Fútbol — Bucaramanga</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg-card: #0f0f1a;
      --bg-section: #0d0d18;
      --primary: #16a34a;
      --primary-dark: #0f7a38;
      --primary-light: #22c55e;
      --accent: #facc15;
      --accent-glow: rgba(250, 204, 21, 0.4);
      --primary-glow: rgba(22, 163, 74, 0.4);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(22, 163, 74, 0.2);
      --border-accent: rgba(250, 204, 21, 0.2);
      --radius: 12px;
      --radius-lg: 20px;
      --transition: 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

    /* ===== ANIMATIONS ===== */
    @keyframes glow-pulse {
      0%, 100% {
        box-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow);
      }
      50% {
        box-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 0 80px var(--primary-glow), 0 0 120px rgba(22, 163, 74, 0.2);
      }
    }

    @keyframes glow-pulse-accent {
      0%, 100% {
        box-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
      }
      50% {
        box-shadow: 0 0 25px var(--accent-glow), 0 0 50px var(--accent-glow), 0 0 80px rgba(250, 204, 21, 0.15);
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes hero-glow {
      0% {
        background-position: 0% 50%;
        opacity: 0.6;
      }
      50% {
        background-position: 100% 50%;
        opacity: 1;
      }
      100% {
        background-position: 0% 50%;
        opacity: 0.6;
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes border-glow {
      0%, 100% { border-color: var(--primary); }
      50% { border-color: var(--accent); }
    }

    @keyframes text-glow {
      0%, 100% { text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow); }
      50% { text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow), 0 0 60px rgba(22, 163, 74, 0.3); }
    }

    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Slide-up class para Intersection Observer */
    .slide-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .slide-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .slide-up:nth-child(2) { transition-delay: 0.15s; }
    .slide-up:nth-child(3) { transition-delay: 0.3s; }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
      animation: fade-in 0.6s ease forwards;
    }

    .navbar.scrolled {
      background: rgba(10, 10, 15, 0.97);
      box-shadow: 0 4px 30px rgba(22, 163, 74, 0.1);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      animation: glow-pulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .nav-logo-text span:first-child {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--primary-light);
      letter-spacing: 0.5px;
    }

    .nav-logo-text span:last-child {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width var(--transition);
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff !important;
      padding: 0.5rem 1.2rem;
      border-radius: 25px;
      font-weight: 700 !important;
      transition: var(--transition) !important;
    }

    .nav-cta:hover {
      transform: scale(1.05);
      animation: glow-pulse 1.5s ease-in-out infinite;
    }

    .nav-cta::after { display: none !important; }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: var(--transition);
    }

    .nav-mobile {
      display: none;
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      background: rgba(10, 10, 15, 0.98);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
      z-index: 999;
      backdrop-filter: blur(16px);
      animation: fade-in-up 0.3s ease;
    }

    .nav-mobile.open { display: block; }

    .nav-mobile ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .nav-mobile ul a {
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      display: block;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }

    .nav-mobile ul a:hover { color: var(--primary-light); padding-left: 8px; }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-top: 70px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10, 10, 15, 0.92) 0%,
        rgba(22, 163, 74, 0.15) 40%,
        rgba(10, 10, 15, 0.85) 100%
      );
      z-index: 1;
    }

    .hero-glow-layer {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 80% 60% at 50% 50%,
        rgba(22, 163, 74, 0.12) 0%,
        rgba(250, 204, 21, 0.05) 40%,
        transparent 70%
      );
      background-size: 200% 200%;
      animation: hero-glow 6s ease-in-out infinite;
      z-index: 2;
    }

    .hero-particles {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float 4s ease-in-out infinite;
    }

    .particle:nth-child(1) { width: 6px; height: 6px; background: var(--primary); top: 20%; left: 10%; opacity: 0.5; animation-delay: 0s; }
    .particle:nth-child(2) { width: 4px; height: 4px; background: var(--accent); top: 60%; left: 80%; opacity: 0.4; animation-delay: 1s; }
    .particle:nth-child(3) { width: 8px; height: 8px; background: var(--primary-light); top: 80%; left: 20%; opacity: 0.3; animation-delay: 2s; }
    .particle:nth-child(4) { width: 5px; height: 5px; background: var(--accent); top: 30%; left: 70%; opacity: 0.45; animation-delay: 0.5s; }
    .particle:nth-child(5) { width: 3px; height: 3px; background: var(--primary); top: 50%; left: 50%; opacity: 0.35; animation-delay: 1.5s; }

    .hero-content {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      animation: fade-in-up 1s ease 0.2s both;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid var(--border);
      color: var(--primary-light);
      padding: 0.4rem 1rem;
      border-radius: 25px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    .hero-badge span:first-child {
      animation: spin-slow 4s linear infinite;
      display: inline-block;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: -1px;
    }

    .hero h1 .line1 {
      display: block;
      color: var(--text);
    }

    .hero h1 .line2 {
      display: block;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: text-glow 3s ease-in-out infinite;
    }

    .hero h1 .line3 {
      display: block;
      color: var(--text);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      max-width: 540px;
      line-height: 1.7;
    }

    .hero-subtitle strong {
      color: var(--accent);
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: var(--transition);
      animation: glow-pulse 3s ease-in-out infinite;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      color: var(--primary-light);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .stat-item { text-align: left; }
    .stat-num {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
    }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }

    /* ===== SECTION COMMON ===== */
    section { padding: 5rem 1.5rem; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(22, 163, 74, 0.1);
      border: 1px solid var(--border);
      color: var(--primary-light);
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .section-title .highlight {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-desc {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 560px;
    }

    /* ===== FEATURES ===== */
    .features {
      background: var(--bg-section);
      position: relative;
      overflow: hidden;
    }

    .features::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(22, 163, 74, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .features-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.4s ease;
      transform-origin: left;
    }

    .feature-card:hover::before { transform: scaleX(1); }

    .feature-card:hover {
      border-color: var(--primary);
      transform: translateY(-8px);
      animation: glow-pulse 2s ease-in-out infinite;
    }

    .feature-icon {
      font-size: 3rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    .feature-card:nth-child(2) .feature-icon { animation-delay: 0.5s; }
    .feature-card:nth-child(3) .feature-icon { animation-delay: 1s; }

    .feature-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .feature-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ===== GALLERY ===== */
    .gallery {
      background: var(--bg);
      position: relative;
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: auto;
      gap: 1rem;
    }

    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .gallery-item:first-child {
      grid-column: 1 / -1;
      height: 280px;
    }

    .gallery-item:not(:first-child) {
      height: 200px;
    }

    .gallery-item:hover {
      transform: scale(1.02);
      border-color: var(--primary);
      animation: glow-pulse 2s ease-in-out infinite;
      z-index: 2;
    }

    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--bg-card), rgba(22, 163, 74, 0.05));
    }

    .gallery-placeholder span:first-child {
      font-size: 2.5rem;
    }

    .gallery-placeholder span:last-child {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10, 10, 15, 0.8) 0%, transparent 60%);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-overlay-text {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* ===== VIDEO ===== */
    .video-section {
      background: var(--bg-section);
      position: relative;
      overflow: hidden;
    }

    .video-section::after {
      content: '';
      position: absolute;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(250, 204, 21, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .video-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .video-wrapper {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      animation: glow-pulse-accent 4s ease-in-out infinite;
    }

    .video-wrapper video {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }

    .video-fallback {
      width: 100%;
      height: 360px;
      background: linear-gradient(135deg, var(--bg-card), rgba(22, 163, 74, 0.08));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .video-play-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      animation: glow-pulse 2.5s ease-in-out infinite;
    }

    /* ===== UBICACION ===== */
    .ubicacion {
      background: var(--bg);
    }

    .ubicacion-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    .ubicacion-info { order: 1; }

    .ubicacion-map { order: 2; }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      transition: var(--transition);
    }

    .info-item:hover {
      border-color: var(--primary);
      transform: translateX(5px);
    }

    .info-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    .info-text h4 {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-text p {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 600;
    }

    .map-container {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      height: 320px;
      position: relative;
      animation: glow-pulse 4s ease-in-out infinite;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .map-placeholder {
      width: 100%;
      height: 100%;
