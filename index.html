<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbería's 10 — Estilo Urbano Fútbol | Bucaramanga</title>
  <meta name="description" content="Barbería's 10, cortes de élite con actitud urbana en La Victoria, Bucaramanga. Estilo futbolero y experiencia única." />
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --primary:  #16a34a;
      --accent:   #facc15;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --card-bg:  #12121a;
      --border:   rgba(22,163,74,.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    img, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ─── KEYFRAMES ────────────────────────────────────────── */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 8px var(--primary), 0 0 20px rgba(22,163,74,.35); }
      50%       { box-shadow: 0 0 18px var(--primary), 0 0 45px rgba(22,163,74,.6), 0 0 70px rgba(250,204,21,.15); }
    }

    @keyframes accent-pulse {
      0%, 100% { box-shadow: 0 0 8px var(--accent), 0 0 22px rgba(250,204,21,.3); }
      50%       { box-shadow: 0 0 22px var(--accent), 0 0 55px rgba(250,204,21,.55); }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes hero-glow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── SLIDE-UP (JS toggle) ─────────────────────────────── */
    .slide-up { opacity: 0; transform: translateY(48px); transition: opacity .65s ease, transform .65s ease; }
    .slide-up.visible { opacity: 1; transform: translateY(0); }

    /* ─── NAV ──────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: .85rem 1.25rem;
      background: rgba(10,10,15,.78);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex; align-items: center; gap: .55rem;
      font-weight: 800; font-size: 1.1rem; letter-spacing: .03em;
    }

    .nav-brand .ball {
      width: 34px; height: 34px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 4%, var(--primary) 40%, #063d1e 100%);
      animation: spin-slow 8s linear infinite;
      box-shadow: 0 0 10px rgba(22,163,74,.6);
    }

    .nav-brand span { color: var(--accent); }

    .nav-links {
      display: flex; gap: 1.5rem; list-style: none;
    }

    .nav-links a {
      font-size: .9rem; color: var(--muted);
      transition: color .25s;
    }
    .nav-links a:hover { color: var(--accent); }

    .nav-cta {
      background: var(--primary); color: #fff;
      padding: .45rem 1.1rem; border-radius: 6px;
      font-size: .85rem; font-weight: 700;
      animation: glow-pulse 3s ease-in-out infinite;
      transition: transform .2s;
    }
    .nav-cta:hover { transform: scale(1.05); }

    /* hamburger */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: .3s; }

    /* ─── HERO ─────────────────────────────────────────────── */
    #inicio {
      position: relative; min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding-top: 70px;
    }

    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
    }

    .hero-bg img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      opacity: .35;
    }

    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10,10,15,.92) 0%,
        rgba(22,163,74,.18) 40%,
        rgba(250,204,21,.08) 70%,
        rgba(10,10,15,.95) 100%
      );
      background-size: 300% 300%;
      animation: hero-glow 8s ease infinite;
    }

    /* animated orbs */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(22,163,74,.28) 0%, transparent 70%);
      top: -80px; left: -100px;
      animation: float 7s ease-in-out infinite;
    }
    .orb-2 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(250,204,21,.18) 0%, transparent 70%);
      bottom: 40px; right: -60px;
      animation: float 9s ease-in-out infinite reverse;
    }

    .hero-content {
      position: relative; z-index: 1;
      text-align: center; padding: 2rem 1.25rem;
      max-width: 780px;
      animation: fade-in .9s ease both;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(22,163,74,.12); border: 1px solid rgba(22,163,74,.4);
      padding: .35rem .9rem; border-radius: 999px;
      font-size: .78rem; font-weight: 600; color: var(--primary);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900; line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: .75rem;
    }

    .hero-content h1 span { color: var(--accent); }

    .hero-sub {
      font-size: clamp(.95rem, 2.5vw, 1.2rem);
      color: var(--muted); max-width: 560px; margin: 0 auto 2rem;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--primary); color: #fff;
      padding: .9rem 2.2rem; border-radius: 8px;
      font-size: 1rem; font-weight: 800; letter-spacing: .04em;
      animation: glow-pulse 2.5s ease-in-out infinite;
      transition: transform .2s, filter .2s;
      border: none; cursor: pointer;
    }
    .btn-primary:hover { transform: translateY(-3px) scale(1.04); filter: brightness(1.15); }

    .hero-stats {
      display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;
      margin-top: 2.5rem;
    }
    .stat { text-align: center; }
    .stat strong { display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent); }
    .stat span   { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

    /* ─── SCROLL INDICATOR ─────────────────────────────────── */
    .scroll-hint {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      opacity: .5; animation: float 2s ease-in-out infinite; z-index: 1;
    }
    .scroll-hint span { font-size: .7rem; letter-spacing: .1em; color: var(--muted); }
    .scroll-hint svg  { fill: var(--muted); }

    /* ─── SECTION WRAPPER ──────────────────────────────────── */
    section { padding: 5rem 1.25rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    .section-label {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .72rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--primary);
      margin-bottom: .6rem;
    }
    .section-label::before {
      content: ''; display: inline-block; width: 18px; height: 2px; background: var(--primary);
    }

    h2.section-title {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 900; line-height: 1.15; margin-bottom: .75rem;
    }
    h2.section-title span { color: var(--accent); }

    .section-desc { color: var(--muted); max-width: 520px; font-size: .97rem; }

    /* ─── FEATURES ─────────────────────────────────────────── */
    #features { background: rgba(22,163,74,.03); }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      position: relative;
      overflow: hidden;
      transition: transform .3s, border-color .3s;
    }

    .feature-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(22,163,74,.07) 0%, transparent 60%);
      opacity: 0; transition: opacity .3s;
    }
    .feature-card:hover { transform: translateY(-6px); border-color: var(--primary); }
    .feature-card:hover::before { opacity: 1; }
    .feature-card:hover { animation: glow-pulse 2s ease-in-out infinite; }

    .feature-icon {
      font-size: 2.6rem; margin-bottom: 1rem;
      animation: float 5s ease-in-out infinite;
    }

    .feature-card h3 {
      font-size: 1.15rem; font-weight: 800; margin-bottom: .5rem;
      color: var(--text);
    }

    .feature-card p { color: var(--muted); font-size: .9rem; }

    .feature-card .corner-accent {
      position: absolute; top: -20px; right: -20px;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(250,204,21,.1) 0%, transparent 70%);
    }

    /* ─── GALLERY ──────────────────────────────────────────── */
    #gallery { }

    .gallery-header { margin-bottom: 2.5rem; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .75rem;
    }

    @media (min-width: 640px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .gallery-grid .featured {
        grid-column: span 2;
      }
    }

    .gallery-item {
      border-radius: 12px; overflow: hidden;
      position: relative; aspect-ratio: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .gallery-item.featured { aspect-ratio: 16/9; }

    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .5s ease, filter .5s;
    }
    .gallery-item:hover img { transform: scale(1.07); filter: brightness(1.1) saturate(1.2); }

    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,.8) 0%, transparent 60%);
      opacity: 0; transition: opacity .3s;
      display: flex; align-items: flex-end; padding: .85rem;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span { font-size: .82rem; font-weight: 600; color: var(--accent); }

    /* placeholder cards */
    .gallery-placeholder {
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--muted);
      background: linear-gradient(135deg, var(--card-bg) 0%, rgba(22,163,74,.05) 100%);
    }

    /* ─── VIDEO ────────────────────────────────────────────── */
    #video-section {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .video-wrapper {
      display: grid;
      gap: 3rem;
      align-items: center;
    }

    @media (min-width: 768px) {
      .video-wrapper { grid-template-columns: 1fr 1fr; }
    }

    .video-container {
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(22,163,74,.2);
      animation: glow-pulse 4s ease-in-out infinite;
      position: relative;
    }

    .video-container video {
      width: 100%; display: block;
      border-radius: 16px;
    }

    .video-info h2 { margin-bottom: 1rem; }

    .video-features {
      list-style: none; margin-top: 1.5rem;
      display: flex; flex-direction: column; gap: .75rem;
    }
    .video-features li {
      display: flex; align-items: flex-start; gap: .65rem;
      font-size: .92rem; color: var(--muted);
    }
    .video-features li .check {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
      background: rgba(22,163,74,.15); border: 1px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; color: var(--primary); margin-top: 2px;
    }

    /* ─── UBICACION ────────────────────────────────────────── */
    #ubicacion { }

    .ubicacion-grid {
      display: grid; gap: 2.5rem;
      margin-top: 2.5rem;
    }

    @media (min-width: 768px) {
      .ubicacion-grid { grid-template-columns: 1fr 1fr; align-items: start; }
    }

    .map-container {
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(22,163,74,.15);
      aspect-ratio: 4/3;
      animation: glow-pulse 5s ease-in-out infinite;
    }

    .map-container iframe {
      width: 100%; height: 100%; border: none; display: block;
      filter: grayscale(30%) invert(5%);
    }

    .info-cards { display: flex; flex-direction: column; gap: 1rem; }

    .info-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem 1.5rem;
      display: flex; align-items: flex-start; gap: 1rem;
      transition: border-color .3s, transform .3s;
    }
    .info-card:hover { border-color: var(--primary); transform: translateX(4px); }

    .info-card .ico {
      font-size: 1.5rem; flex-shrink: 0;
      width: 44px; height: 44px;
      background: rgba(22,163,74,.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .info-card h4 { font-size: .8rem; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: .25rem; }
    .info-card p  { font-size: .92rem; color: var(--text); font-weight: 500; }

    /* ─── CONTACTO / CTA ───────────────────────────────────── */
    #contacto {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
    }

    .cta-wrapper {
      text-align: center; max-width: 640px; margin: 0 auto;
    }

    .cta-wrapper h2 { margin-bottom: 1rem; }
    .cta-wrapper p  { color: var(--muted); margin-bottom: 2rem; }

    .cta-buttons { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: .85rem 2rem; border-radius: 8px;
      font-size: .95rem; font-weight: 700;
      animation: accent-pulse 3s ease-in-out infinite;
      transition: transform .2s, background .2s;
      cursor: pointer;
    }
    .btn-secondary:hover { transform: translateY(-3px); background: rgba(250,204,21,.08); }

    .contact-form {
      background: rgba(22,163,74,.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      margin-top: 3rem;
      text-align: left;
    }

    .contact-form h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1.5rem; color: var(--text); }

    .form-grid { display: grid; gap: 1rem; }
    @media (min-width: 480px) { .form-grid { grid-template-columns: 1fr 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .7rem .9rem;
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .25s, box-shadow .25s;
      outline: none;
      width: 100%;
      resize: vertical;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22,163,74,.15);
    }

    .form-group select option { background: #1a1a24; }

    .form-submit {
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: .85rem 2rem; font-size: .95rem; font-weight: 800;
      cursor: pointer; width: 100%;
      margin-top: .5rem;
      animation: glow-pulse 3s ease-in-out infinite;
      transition: transform .2s, filter .2s;
    }
    .form-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ─── FOOTER ───────────────────────────────────────────── */
    footer {
      background: #07070c;
      border-top: 1px solid var(--border);
      padding: 2.5rem 1.25rem 1.75rem;
    }

    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
      gap: 1.5rem; text-align: center;
    }

    @media (min-width: 640px) {
      .footer-inner { flex-direction: row; justify-content: space-between; text-align: left; }
    }

    .footer-brand { display: flex; align-items: center; gap: .55rem; font-weight: 800; }
    .footer-brand .ball {
      width: 28px; height: 28px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 4%, var(--primary) 40%, #063d1e 100%);
      box-shadow: 0 0 8px rgba(22,163,74,.5);
    }
    .footer-brand span { color: var(--accent); }

    .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .footer-links a { font-size: .85rem; color: var(--muted); transition: color .25s; }
    .footer-links a:hover { color: var(--accent); }

    .footer-copy { font-size: .78rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .footer-copy span { color: var(--primary); }

    /* ─── DIVIDER LINE ─────────────────────────────────────── */
    .divider {
      height: 1px; max-width: 1100px; margin: 0 auto;
      background: linear-gradient(to right, transparent, var(--primary), transparent);
    }

    /* ─── TOAST ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999;
      background: var(--primary); color: #fff;
      padding: .75rem 1.4rem; border-radius: 10px;
      font-size: .88rem; font-weight: 700;
      box-shadow: 0 0 20px rgba(22,163,74,.5);
      transform: translateY(80px); opacity: 0;
      transition: transform .4s ease, opacity .4s ease;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ─── RESPONSIVE NAV ───────────────────────────────────── */
    @media (max-width: 700px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background: rgba(10,10,15,.97); padding: 1.25rem 1.5rem; gap: 1rem; border-bottom: 1px solid var(--border); }
      .nav-links.open { display: flex; }
      .hamburger { display: flex; }
      .nav-cta.desktop { display: none; }
    }

    @media (min-width: 701px) {
      .hamburger { display: none; }
      .nav-links { display: flex !important; }
    }

    /* ─── BACK TO TOP ──────────────────────────────────────── */
    #back-top {
      position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 99;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(22,163,74,.15);
      border: 1.5px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; pointer-events: none;
      transition: opacity .35s, transform .3s;
      color: var(--primary); font-size: 1.1rem;
    }
    #back-top.visible { opacity: 1; pointer-events: auto; }
    #back-top:hover { transform: translateY(-3px); background: rgba(22,163,74,.3); }
  </style>
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────── -->
  <nav id="navbar" role="navigation" aria-label="Menú principal">
    <div class="nav-brand">
      <div class="ball" aria-hidden="true"></div>
      Barbería's <span>10</span>
    </div>

    <ul class="nav-links" id="nav-links">
      <li><a href="#inicio">Inicio</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#gallery">Galería</a></li>
      <li><a href="#ubicacion">Ubicación</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>

    <a href="#contacto" class="nav-cta desktop">Reserva</a>

    <button class="hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── HERO ────────────────────────────────────────── -->
  <section id="inicio" aria-label="Hero principal">
    <div class="hero-bg">
      <img src="./assets/images/barberias-10-landing-imagen-1-2026-03-25T17-28-26.jpg"
           alt="Barbería's 10 Estilo Urbano Fútbol"
           loading="eager" />
      <div class="hero-gradient"></div>
    </div>

    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div class="hero-content">
      <p class="hero-badge" aria-label="Barbería en Bucaramanga">
        ⚽ Bucaramanga — La Victoria
      </p>

      <h1>Barbería's 10<br><span>Tu Estilo, Tu Cancha</span></h1>

      <p class="hero-sub">
        Cortes de élite con actitud urbana en La Victoria, Bucaramanga
      </p>

      <a href="#contacto" class="btn-primary" role="button">
        ✂️ Reserva Ahora
      </a>

      <div class="hero-stats" role="list" aria-label="Estadísticas">
        <div class="stat" role="listitem">
          <strong>500+</strong>
