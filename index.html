<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Barbería's 10 Estilo Urbano Fútbol - Cortes de élite con actitud urbana en La Victoria, Bucaramanga">
  <title>Barbería's 10 — Estilo Urbano Fútbol | Bucaramanga</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg-2: #0f0f1a;
      --bg-3: #12121f;
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-light: #22c55e;
      --accent: #facc15;
      --accent-dark: #eab308;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(22, 163, 74, 0.25);
      --glow-green: rgba(22, 163, 74, 0.6);
      --glow-yellow: rgba(250, 204, 21, 0.6);
      --radius: 16px;
      --radius-sm: 8px;
      --transition: 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    img, video {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes glow-pulse {
      0%, 100% {
        box-shadow: 0 0 20px var(--glow-green), 0 0 40px rgba(22, 163, 74, 0.3), 0 0 60px rgba(22, 163, 74, 0.1);
      }
      50% {
        box-shadow: 0 0 30px var(--glow-green), 0 0 60px rgba(22, 163, 74, 0.5), 0 0 90px rgba(22, 163, 74, 0.2);
      }
    }

    @keyframes glow-pulse-accent {
      0%, 100% {
        box-shadow: 0 0 20px var(--glow-yellow), 0 0 40px rgba(250, 204, 21, 0.3);
      }
      50% {
        box-shadow: 0 0 35px var(--glow-yellow), 0 0 70px rgba(250, 204, 21, 0.5);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes hero-glow {
      0% {
        background-position: 0% 50%;
        opacity: 0.6;
      }
      50% {
        background-position: 100% 50%;
        opacity: 1;
      }
      100% {
        background-position: 0% 50%;
        opacity: 0.6;
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes border-glow {
      0%, 100% { border-color: var(--primary); }
      50% { border-color: var(--accent); }
    }

    @keyframes text-shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* slide-up base state */
    .slide-up {
      opacity: 0;
      transform: translateY(60px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .slide-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .slide-up:nth-child(2) { transition-delay: 0.15s; }
    .slide-up:nth-child(3) { transition-delay: 0.3s; }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }

    .navbar.scrolled {
      padding: 0.75rem 1.5rem;
      box-shadow: 0 4px 30px rgba(22, 163, 74, 0.15);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .nav-brand .num {
      color: var(--accent);
      font-size: 1.5rem;
    }

    .nav-brand .txt {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: color var(--transition);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width var(--transition);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      display: none;
      padding: 0.5rem 1.25rem;
      background: var(--primary);
      color: white;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 700;
      transition: var(--transition);
      animation: glow-pulse 3s infinite;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: var(--transition);
    }

    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(10, 10, 15, 0.98);
      backdrop-filter: blur(20px);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu a {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: color var(--transition);
    }

    .mobile-menu a:hover {
      color: var(--primary-light);
    }

    /* ===== HERO SECTION ===== */
    #inicio {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-top: 80px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10, 10, 15, 0.3) 0%,
        rgba(10, 10, 15, 0.6) 40%,
        rgba(10, 10, 15, 0.92) 100%
      );
    }

    .hero-glow-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 30% 50%,
        rgba(22, 163, 74, 0.2) 0%,
        rgba(250, 204, 21, 0.1) 40%,
        transparent 70%
      );
      background-size: 200% 200%;
      animation: hero-glow 6s ease infinite;
      z-index: 1;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(22, 163, 74, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 163, 74, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      text-align: center;
      animation: fade-in 1s ease forwards;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid var(--primary);
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary-light);
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: glow-pulse 3s infinite;
    }

    .hero-badge .ball {
      animation: spin-slow 4s linear infinite;
      display: inline-block;
    }

    h1.hero-title {
      font-size: clamp(2rem, 7vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 1.25rem;
    }

    .hero-title .line-1 {
      display: block;
      color: var(--text);
    }

    .hero-title .line-2 {
      display: block;
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 50%, var(--primary-light) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: text-shimmer 3s linear infinite;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .hero-subtitle strong {
      color: var(--accent);
    }

    .hero-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      border: none;
      transition: transform var(--transition), background var(--transition);
      animation: glow-pulse 2.5s ease-in-out infinite;
      text-transform: uppercase;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--primary);
      background: rgba(22, 163, 74, 0.1);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== FEATURES SECTION ===== */
    #features {
      padding: 6rem 1.5rem;
      background: var(--bg-2);
      position: relative;
      overflow: hidden;
    }

    #features::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--primary), transparent);
    }

    .section-header {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 4rem;
    }

    .section-tag {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      background: rgba(250, 204, 21, 0.1);
      border: 1px solid rgba(250, 204, 21, 0.3);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .section-title span {
      color: var(--primary-light);
    }

    .section-desc {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .feature-card {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: default;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(22, 163, 74, 0.08), transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 20px 60px rgba(22, 163, 74, 0.2);
    }

    .feature-card.visible {
      animation: glow-pulse 4s ease-in-out infinite;
    }

    .feature-icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    .feature-card:nth-child(2) .feature-icon {
      animation-delay: 1.3s;
    }

    .feature-card:nth-child(3) .feature-icon {
      animation-delay: 2.6s;
    }

    .feature-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .feature-title .highlight {
      color: var(--accent);
    }

    .feature-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .feature-tag {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.3rem 0.8rem;
      background: rgba(22, 163, 74, 0.1);
      border: 1px solid rgba(22, 163, 74, 0.3);
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary-light);
    }

    /* ===== GALLERY SECTION ===== */
    #gallery {
      padding: 6rem 1.5rem;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .gallery-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .gallery-showcase {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .gallery-main {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .gallery-main img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      object-position: center top;
      transition: transform 0.5s ease;
    }

    .gallery-main:hover img {
      transform: scale(1.03);
    }

    .gallery-main-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(10, 10, 15, 0.9) 100%);
      display: flex;
      align-items: flex-end;
      padding: 2rem;
    }

    .gallery-main-info h3 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .gallery-main-info p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .gallery-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.4rem 1rem;
      background: var(--accent);
      color: #0a0a0f;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .gallery-side {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .gallery-side-item {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.75rem;
      transition: var(--transition);
      min-height: 140px;
    }

    .gallery-side-item:hover {
      border-color: var(--primary);
      background: rgba(22, 163, 74, 0.05);
      transform: translateY(-4px);
    }

    .gallery-side-icon {
      font-size: 2.5rem;
    }

    .gallery-side-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .gallery-side-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
    }

    /* ===== VIDEO SECTION ===== */
    #video {
      padding: 6rem 1.5rem;
      background: var(--bg-2);
      position: relative;
      overflow: hidden;
    }

    #video::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--primary), transparent);
    }

    .video-container {
      max-width: 900px;
      margin: 3rem auto 0;
    }

    .video-wrapper {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(22, 163, 74, 0.2);
      animation: glow-pulse 4s ease-in-out infinite;
    }

    .video-wrapper video {
      width: 100%;
      height: auto;
      max-height: 500px;
      object-fit: cover;
      display: block;
    }

    .video-overlay-corner {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      background: rgba(10, 10, 15, 0.8);
      border: 1px solid var(--primary);
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary-light);
      letter-spacing: 1px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: glow-pulse 1.5s infinite;
    }

    /* ===== CTA SECTION ===== */
    #contacto {
      padding: 6rem 1.5rem;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .cta-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 163, 74, 0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .cta-card {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
      border: 1px solid var(--primary);
      border-radius: 24px;
      padding: 4rem 2rem;
      text-align: center;
      animation: glow-pulse 3.5s ease-in-out infinite;
      overflow: hidden;
    }

    .cta-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(22, 163, 74, 0.05), transparent 60%);
      pointer-events: none;
    }

    .cta-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    .cta-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 900;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .cta-title span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cta-desc {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .cta-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .btn-accent {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #0a0a0f;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: transform var(--transition);
      animation: glow-pulse-accent 2.5s ease-in-out infinite;
      text-transform: uppercase;
    }

    .btn-accent:hover {
      transform: translateY(-3px) scale(1.03);
    }

    .cta-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .cta-info-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .cta-info-item .icon {
      color: var(--primary-light);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--bg-2);
      padding: 3rem 1.5rem 2rem;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    .footer-brand {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .footer-logo {
      font-size: 1.3rem;
      font-weight: 900;
    }

    .footer-logo .num {
      color: var(--accent);
      font-size: 1.5rem;
    }
